<!DOCTYPE html>
<html lang="nl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo App</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <h1>Todo App</h1>

        <div class="add-todo-form">
            <h2>Nieuwe todo toevoegen</h2>
            <form id="todoForm">
                <input type="text" id="todoInput" placeholder="Voer een nieuwe todo in..." maxlength="50" required>
                <button type="submit">Toevoegen</button>
            </form>
        </div>

        <div class="todo-list">
            <h2>Mijn Todo's</h2>
            <ul id="todoList"></ul>
            <p id="emptyMessage" style="display: none;">Geen todos. Voeg er een toe!</p>
        </div>
    </div>

    <script src="app.js"></script>
</body>

</html>
